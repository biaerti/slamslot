  <line x1="16" y1="23" x2="16" y2="29" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
  <line x1="3" y1="16" x2="9" y2="16" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
